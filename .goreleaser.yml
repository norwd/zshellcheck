#       install -Dm644 "./completions/bash/zshellcheck-completion.bash" "${pkgdir}/usr/share/bash-completion/completions/zshellcheck"

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--output-certificate=${certificate}'
      - '--output-signature=${signature}'
      - '${artifact}'
      - "--yes" # needed on cosign 2.0.0+
    artifacts: all
    output: true

# Sign the multi-arch Docker manifest with cosign keyless OIDC.
docker_signs:
  - cmd: cosign
    args:
      - sign
      - '${artifact}@${digest}'
      - "--yes"
    artifacts: manifests
    output: true

checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

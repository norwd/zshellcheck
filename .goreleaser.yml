# .goreleaser.yml
version: 2
builds:
  - main: ./cmd/zshellcheck
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s -w -X main.version={{.Version}}
    flags:
      - -trimpath
      - -pgo=pgo/default.pgo


archives:
  - # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - man/man1/zshellcheck.1
      - completions/zsh/_zshellcheck
      - completions/bash/zshellcheck-completion.bash

# Linux distro packages — produces .deb (Debian/Ubuntu), .rpm (Fedora/RHEL/Rocky/openSUSE),
# and .apk (Alpine) artifacts on every tag. Uploaded alongside the tarballs.
# Users install with: dpkg -i / rpm -i / apk add --allow-untrusted.
nfpms:
  - id: zshellcheck-pkg
    package_name: zshellcheck
    file_name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    homepage: https://github.com/afadesigns/zshellcheck
    description: |-
      Static analysis and auto-fix for the setopts, hooks, and globs Bash never learned.
      ZShellCheck lints Zsh scripts with compiler-grade precision: 1000 Zsh-specific katas,
      67 deterministic auto-fixes, signed releases, SLSA Level 3 provenance.
    maintainer: Andreas Fahl <github@afadesign.co>
    license: MIT
    vendor: afadesigns
    section: devel
    priority: optional
    formats:
      - deb
      - rpm
      - apk
    contents:
      - src: ./man/man1/zshellcheck.1
        dst: /usr/share/man/man1/zshellcheck.1
        file_info:
          mode: 0644
      - src: ./completions/zsh/_zshellcheck
        dst: /usr/share/zsh/site-functions/_zshellcheck
        file_info:
          mode: 0644
      - src: ./completions/bash/zshellcheck-completion.bash
        dst: /usr/share/bash-completion/completions/zshellcheck
        file_info:
          mode: 0644
      - src: ./LICENSE
        dst: /usr/share/doc/zshellcheck/LICENSE
        file_info:
          mode: 0644
      - src: ./README.md
        dst: /usr/share/doc/zshellcheck/README.md
        file_info:
          mode: 0644

# Multi-arch Docker image — published to GitHub Container Registry on every tag.
# `FROM scratch` keeps the image at ~2 MB; the binary is fully static (CGO_ENABLED=0).
dockers:
  - id: zshellcheck-amd64
    use: buildx
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/afadesigns/zshellcheck:{{ .Version }}-amd64"
      - "ghcr.io/afadesigns/zshellcheck:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Static analysis and auto-fix for the setopts, hooks, and globs Bash never learned."
      - "--label=org.opencontainers.image.source=https://github.com/afadesigns/zshellcheck"
      - "--label=org.opencontainers.image.url=https://github.com/afadesigns/zshellcheck"
      - "--label=org.opencontainers.image.licenses=MIT"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
  - id: zshellcheck-arm64
    use: buildx
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/afadesigns/zshellcheck:{{ .Version }}-arm64"
      - "ghcr.io/afadesigns/zshellcheck:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Static analysis and auto-fix for the setopts, hooks, and globs Bash never learned."
      - "--label=org.opencontainers.image.source=https://github.com/afadesigns/zshellcheck"
      - "--label=org.opencontainers.image.url=https://github.com/afadesigns/zshellcheck"
      - "--label=org.opencontainers.image.licenses=MIT"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

docker_manifests:
  - name_template: "ghcr.io/afadesigns/zshellcheck:{{ .Version }}"
    image_templates:
      - "ghcr.io/afadesigns/zshellcheck:{{ .Version }}-amd64"
      - "ghcr.io/afadesigns/zshellcheck:{{ .Version }}-arm64"
  - name_template: "ghcr.io/afadesigns/zshellcheck:latest"
    image_templates:
      - "ghcr.io/afadesigns/zshellcheck:latest-amd64"
      - "ghcr.io/afadesigns/zshellcheck:latest-arm64"

# AUR (Arch Linux User Repository) — pushes a PKGBUILD to
# aur.archlinux.org/zshellcheck-bin.git on every tag. Requires:
#   - one-time AUR account creation at https://aur.archlinux.org

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "90...100"
  status:
    project:
      default:
        target: 95%
        threshold: 1%
        if_ci_failed: error
        informational: false
        only_pulls: false
    patch:
      default:
        target: 95%
        threshold: 2%
        if_ci_failed: error
        informational: false
    changes:
      default:
        if_not_found: success
        if_ci_failed: error

comment:
  layout: "reach, diff, flags, files, footer"
  behavior: default
  require_changes: true
  require_base: true
  require_head: true
  show_carryforward_flags: true

flags:
  unit:
    paths:
      - pkg/
    carryforward: true

github_checks:
  annotations: true

ignore:
  - "cmd/zshellcheck/main.go"
  - "pkg/testutil"
  - "pkg/version"
  - "tests"
  - "pkg/parser/parser_test_helpers.go"
  - "pkg/parser/parser_test_minimal.go"

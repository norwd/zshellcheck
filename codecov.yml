codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 80%
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%
        if_ci_failed: error

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true
  require_base: true
  require_head: true

ignore:
  - "cmd/zshellcheck/main.go"
  - "pkg/testutil"
  - "pkg/version"
  - "tests"
  - "pkg/parser/parser_test_helpers.go"
  - "pkg/parser/parser_test_minimal.go"

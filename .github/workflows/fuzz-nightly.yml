name: Fuzz (nightly)

on:
  schedule:
    # Every night — much longer budget than the PR fuzz in ci.yml
    - cron: '30 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  fuzz:
    name: Extended fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Lexer
            package: ./pkg/lexer
          - target: Parser
            package: ./pkg/parser
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
          cache: true
      - name: Restore fuzz corpus
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cache/go-build
            testdata/fuzz
          key: fuzz-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-${{ matrix.target }}-
      - name: Fuzz ${{ matrix.target }}
        run: |
          go test -run='^$' -fuzz='Fuzz${{ matrix.target }}' \
            -fuzztime=300s -timeout=25m \
            ${{ matrix.package }}
      - name: Upload failing corpus (on discovery)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-failing-${{ matrix.target }}
          path: ${{ matrix.package }}/testdata/fuzz/
          retention-days: 30

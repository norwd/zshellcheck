name: CI

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - '**.zsh'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          args: --timeout=5m
      - name: Cyclomatic complexity gate (gocyclo > 15)
        run: |
          go install github.com/fzipp/gocyclo/cmd/gocyclo@v0.6.0
          out=$(gocyclo -over 15 . || true)
          baseline=$(cat .github/gocyclo-baseline 2>/dev/null || echo 0)
          if [[ -z "$out" ]]; then
            current=0
          else
            current=$(printf '%s\n' "$out" | grep -c . || true)
          fi
          echo "gocyclo > 15 — baseline: $baseline, current: $current"
          if [[ $current -gt $baseline ]]; then
            echo "::error::gocyclo regressed: $current function(s) over the threshold, baseline allows $baseline"
            echo "$out" | head -20
            exit 1
          fi
          if [[ $current -lt $baseline ]]; then
            echo "::warning::gocyclo improved: $current function(s) over the threshold, baseline still records $baseline. Update .github/gocyclo-baseline to lock the gain in."
          fi
      - name: SPDX + copyright header gate
        run: |
          missing=0
          while IFS= read -r f; do
            head -2 "$f" | grep -q "SPDX-License-Identifier: MIT" || { echo "::error file=$f::missing SPDX header"; missing=$((missing+1)); }
            head -3 "$f" | grep -q "Copyright the ZShellCheck contributors" || { echo "::error file=$f::missing copyright"; missing=$((missing+1)); }
          done < <(git ls-files '*.go')
          [[ $missing -eq 0 ]]
      - name: pkg/katas/ directory cap (GitHub UI 1000-entry limit)
        run: |
          n=$(git ls-tree HEAD pkg/katas/ | wc -l)
          echo "pkg/katas/ entries: $n"
          [[ $n -lt 1000 ]] || { echo "::error::pkg/katas/ has $n entries — GitHub web UI truncates at 1000. Re-run scripts/consolidate-katas-source.py."; exit 1; }
      - name: Dependency freshness (libraries.io)
        run: |
          out=$(go list -m -u all 2>/dev/null | grep -v "^github.com/afadesigns/zshellcheck" | grep -E "\[v[^]]+\]" || true)
          if [[ -n "$out" ]]; then
            echo "::warning::go modules with newer versions available:"
            echo "$out"
          fi

  parser-compat:
    name: Parser corpus sweep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'
          cache: true
      - name: Build zshellcheck
        run: go build -o zshellcheck ./cmd/zshellcheck
      - name: Sweep pinned corpora against baseline
        env:
          ZSHELLCHECK_BIN: ${{ github.workspace }}/zshellcheck
        run: bash scripts/parser-corpus-sweep.sh

  lint-shell:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        env:
          SHELLCHECK_OPTS: '-e SC1071 -e SC2148'
        with:
          scandir: '.'
          severity: warning
          ignore_paths: |-
            tests
            examples
            pkg/katas/testdata
            completions

  build-and-test:
    name: Build & Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: go.sum
      - name: Build
        run: go build -v -o zshellcheck ./cmd/zshellcheck
      - name: Test (Unit)
        shell: bash
        run: |
          COVERPKGS=$(go list ./... | grep -v -E '(cmd/zshellcheck|pkg/version|pkg/testutil|/tests$|katatests)' | tr '\n' ',' | sed 's/,$//')
          go test -v -coverprofile=coverage.txt -covermode=atomic -coverpkg="$COVERPKGS" ./...
      - name: Project-wide coverage gate (≥ 90.0% gold-tier floor)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          go clean -testcache
          go test -count=1 -coverpkg=./... -coverprofile=cov-total.out ./... > /dev/null 2>&1
          total=$(go tool cover -func=cov-total.out | tail -1 | awk '{print $NF}' | tr -d '%')
          echo "project-wide statement coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t >= 90.0) ? 0 : 1 }' || {
            echo "::error::Project-wide coverage ${total}% dropped below the gold-tier floor (90.0%)"; exit 1;
          }
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code
      - name: Test install.sh
        if: runner.os != 'Windows'
        run: |
          ./install.sh
          ~/.local/bin/zshellcheck --version
      - name: Install Zsh
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Test (Integration)
        if: runner.os != 'Windows'
        run: |
          chmod +x tests/integration_test.zsh
          ./tests/integration_test.zsh
      - name: Upload coverage to Codecov
        # Dependabot PRs run with restricted secrets, so CODECOV_TOKEN is
        # not exposed and the upload fails the build. Skip the upload for
        # those runs; the gate still fires on every human-authored PR
        # because secrets are available there.
        if: github.actor != 'dependabot[bot]'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.txt
          fail_ci_if_error: true
      - name: Upload Binary Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zshellcheck-${{ runner.os }}-${{ runner.arch }}
          path: zshellcheck${{ runner.os == 'Windows' && '.exe' || '' }}
          retention-days: 5

  fuzz:
    name: Fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'
          cache: true
          cache-dependency-path: go.sum
      - name: Fuzz Lexer
        run: go test -fuzz=FuzzLexer -fuzztime=20s -timeout=60s ./pkg/lexer
      - name: Fuzz Parser
        run: go test -fuzz=FuzzParser -fuzztime=20s -timeout=60s ./pkg/parser

  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Scan for vulnerabilities
        run: govulncheck ./...

  sbom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 'stable'
          cache: true
      - name: Build
        run: go build -v ./cmd/zshellcheck
      - name: Generate SBOM
        run: go version -m zshellcheck > sbom-go-modules.txt
      - name: Verify SBOM
        run: test -s sbom-go-modules.txt
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom-go-modules.txt
          retention-days: 30

  # Gate jobs matching branch protection required status checks
  test:
    if: always()
    needs: [lint, lint-shell, build-and-test, fuzz]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all test jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "::error::Lint failed"
            exit 1
          fi
          if [[ "${{ needs.lint-shell.result }}" != "success" ]]; then
            echo "::error::Shell lint failed"
            exit 1
          fi
          if [[ "${{ needs.build-and-test.result }}" != "success" ]]; then
            echo "::error::Build & Test failed"
            exit 1
          fi
          if [[ "${{ needs.fuzz.result }}" != "success" ]]; then
            echo "::error::Fuzzing failed"
            exit 1
          fi

  security:
    if: always()
    needs: [vulncheck]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify security scan passed
        run: |
          if [[ "${{ needs.vulncheck.result }}" != "success" ]]; then
            echo "::error::Vulnerability scan failed"
            exit 1
          fi

name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.7
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8 # 1.69.0
        env:
          # Use PAT so the tag push triggers the release workflow
          # (GITHUB_TOKEN-created events don't trigger downstream workflows)
          GITHUB_TOKEN: ${{ secrets.REDTEAMX_PAT }}
          WITH_V: true
          # No implicit version bumps. Releases are manual: tag explicitly,
          # or put `#patch` / `#minor` / `#major` in a commit message to
          # opt into a bump. Default behavior is to do nothing.
          DEFAULT_BUMP: none

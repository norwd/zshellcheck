# .github/labeler.yml
# Auto-applies labels to PRs based on changed paths.
# Label taxonomy documented in .github/LABELS.md.

ci:
  - changed-files:
      - any-glob-to-any-file: '.github/**'
      - any-glob-to-any-file: '.goreleaser.yml'
      - any-glob-to-any-file: '.pre-commit-config.yaml'
      - any-glob-to-any-file: '.golangci.yml'

docs:
  - changed-files:
      - any-glob-to-any-file: 'docs/**'
      - any-glob-to-any-file: '*.md'
      - any-glob-to-any-file: 'man/**'

area/parser:
  - changed-files:
      - any-glob-to-any-file: 'pkg/lexer/**'
      - any-glob-to-any-file: 'pkg/parser/**'
      - any-glob-to-any-file: 'pkg/ast/**'

area/katas:
  - changed-files:
      - any-glob-to-any-file: 'pkg/katas/**'

area/cli:
  - changed-files:
      - any-glob-to-any-file: 'cmd/**'
      - any-glob-to-any-file: 'install.sh'
      - any-glob-to-any-file: 'install.ps1'
      - any-glob-to-any-file: 'man/**'

test:
  - changed-files:
      - any-glob-to-any-file: 'tests/**'
      - any-glob-to-any-file: '**/*_test.go'

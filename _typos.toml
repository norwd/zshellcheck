[default.extend-words]
# DoubleBracketExpression abbreviated as dbe in AST node names
dbe = "dbe"
# EDE is DES "encrypt-decrypt-encrypt" 3DES mode (openssl cipher name)
ede = "ede"
# Hashi is the short form used in vendor name HashiCorp
Hashi = "Hashi"
# `mis` is a legitimate English prefix, e.g. `mis-nesting`, `mis-typed`
mis = "mis"
# passin / passout are openssl password-source flag names
passin = "passin"
passout = "passout"
# unparseable is standard English spelling (alongside "unparsable")
unparseable = "unparseable"

[default.extend-identifiers]
# mke2fs is the canonical GNU ext2/3/4 filesystem creation tool
mke2fs = "mke2fs"
# chage is the GNU password-aging utility
chage = "chage"
# exportfs is the NFS export-management tool (see ZC1976)
exportfs = "exportfs"

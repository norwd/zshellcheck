version: "2"

run:
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - funlen
    - gocognit
    - gocritic
    - gosec
    - govet
    - ineffassign
    - lll
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    funlen:
      lines: 300
      statements: 300
    gocognit:
      min-complexity: 100
    lll:
      line-length: 250
    misspell:
      ignore-rules:
        - exportfs
    revive:
      rules:
        - name: var-naming
          disabled: true
        - name: increment-decrement
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: indent-error-flow
          disabled: true
        - name: empty-block
          disabled: true
        - name: exported
          disabled: true
        - name: if-return
          disabled: true
    staticcheck:
      # Enforce only the SA (correctness) check group. The S (simplification),
      # ST (style/naming) and QF (quick-fix) groups are advisory and were not
      # surfaced by golangci-lint v1's default integration on this codebase;
      # the v1 → v2 action bump should not change that contract.
      checks:
        - SA*
  exclusions:
    # Restore golangci-lint v1's default exclusion set so the v1 → v2
    # action bump does not surface previously-silenced idioms (deferred
    # Close, common test fixtures, etc.).
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: pkg/config/config.go
        linters:
          - lll
        source: "^\t\""
      # Kata definitions contain example credential-bearing URLs in their
      # detection message strings (zc1727, zc1776, zc1781, zc1795 etc. flag
      # exactly that anti-pattern). These are not real secrets.
      - path: pkg/katas/.*\.go
        linters:
          - gosec
        text: "G101"
      - path: pkg/katas/katatests/.*_test\.go
        linters:
          - gosec
        text: "G101"
      # Lint pipeline writes the rewritten file at the original path; the
      # path comes from the user's CLI arg, validated upstream.
      - path: cmd/zshellcheck/main\.go
        linters:
          - gosec
        text: "G703"

formatters:
  enable:
    - gofumpt

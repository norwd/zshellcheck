repos:
  - repo: https://github.com/golangci/golangci-lint
    rev: v1.64.5
    hooks:
      - id: golangci-lint
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet
      - id: go-unit-tests
  - repo: local
    hooks:
      - id: update-version
        name: Update version from kata count
        entry: bash scripts/update-version.sh
        language: system
        files: 'pkg/katas/zc.*\.go$'
        pass_filenames: false
